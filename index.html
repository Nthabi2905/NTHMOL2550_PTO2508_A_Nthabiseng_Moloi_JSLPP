<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="./styles.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/favicon.svg" />

    <!-- JS -->
    <script defer src="./scripts/main.js" type="module"></script>

    <title>Kanban Task Management</title>
  </head>

  <body>
    <!-- ================= SIDEBAR ================= -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="logo" />
      </div>

      <div class="boards-nav-links-div">
        <h4>ALL BOARDS (1)</h4>
        <button class="board-btn">Launch Career</button>
      </div>

      <!-- Theme Toggle -->
      <button id="theme-toggle">Toggle Theme</button>
    </nav>

    <!-- ================= MAIN ================= -->
    <div id="layout">
      <header class="sticky-header">
        <button id="toggle-sidebar">☰</button>

        <div class="header-name-div">
          <img src="./assets/favicon.svg" class="logo-mobile" />
          <h2>Launch Career</h2>
        </div>

        <button id="add-new-task-btn">+ Add New Task</button>
      </header>

      <!-- Loading + Error -->
      <div id="loading">Loading tasks...</div>
      <div id="error" style="display: none; color: red">
        Failed to load tasks.
      </div>

      <!-- ================= BOARD ================= -->
      <div class="container">
        <main class="card-column-main">
          <!-- TODO -->
          <div class="column-div" data-status="todo">
            <div class="column-head-div">
              <span class="dot" id="todo-dot"></span>
              <h4>TODO</h4>
            </div>
            <div class="tasks-container"></div>
          </div>

          <!-- DOING -->
          <div class="column-div" data-status="doing">
            <div class="column-head-div">
              <span class="dot" id="doing-dot"></span>
              <h4>DOING</h4>
            </div>
            <div class="tasks-container"></div>
          </div>

          <!-- DONE -->
          <div class="column-div" data-status="done">
            <div class="column-head-div">
              <span class="dot" id="done-dot"></span>
              <h4>DONE</h4>
            </div>
            <div class="tasks-container"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- ================= TASK MODAL (FIXED) ================= -->
    <dialog id="task-modal">
      <div class="task-modal-content">
        <div class="modal-header">
          <h3>Task Details</h3>
          <button id="close-modal-btn" class="close-btn">&times;</button>
        </div>

        <form id="task-form">
          <label>Title</label>
          <input type="text" id="task-title" required />

          <label>Description</label>
          <textarea id="task-desc"></textarea>

          <label>Status</label>
          <select id="task-status">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>

          <button type="submit" class="submit-btn">Save Changes</button>

          <button type="button" id="delete-task-btn" class="delete-btn">
            Delete Task
          </button>
        </form>
      </div>
    </dialog>

    <!-- ================= NEW TASK MODAL ================= -->
    <dialog id="new-task-modal">
      <div class="task-modal-content">
        <div class="modal-header">
          <h3>Add New Task</h3>
          <button id="cancel-add-btn" class="close-btn">&times;</button>
        </div>

        <form id="new-task-modal-window">
          <label>Title</label>
          <input type="text" id="title-input" required />

          <label>Description</label>
          <textarea id="desc-input" required></textarea>

          <label>Status</label>
          <select id="select-status">
            <option value="todo">Todo</option>
            <option value="doing">Doing</option>
            <option value="done">Done</option>
          </select>

          <button type="submit" class="submit-btn">Create Task</button>
        </form>
      </div>
    </dialog>
  </body>
</html>
